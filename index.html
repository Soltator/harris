    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5efe6;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #5e4b3c;
            border-bottom: 2px solid #e8dccc;
            padding-bottom: 10px;
        }
        .panel {
            background: #f5ede1;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .score {
            background: #b7a187;
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.3rem;
        }
        button {
            background: white;
            border: 2px solid #b7a187;
            color: #5e4b3c;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #b7a187;
            color: white;
        }
        .question {
            border: 1px solid #e8dccc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .question.correct {
            background: #e1f0e1;
            border-left: 8px solid #2d6a2d;
        }
        .question.incorrect {
            background: #fceaea;
            border-left: 8px solid #b33c3c;
        }
        .question.partial {
            background: #fff3d6;
            border-left: 8px solid #b87c2d;
        }
        .qtitle {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        .qnum {
            background: #e8dccc;
            padding: 3px 12px;
            border-radius: 20px;
            margin-right: 15px;
            white-space: nowrap;
        }
        .options {
            margin: 15px 0;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            margin: 5px 0;
            background: #f9f5ef;
            border-radius: 30px;
            border: 1px solid #e0d2c0;
        }
        .option input {
            margin-right: 15px;
            width: 18px;
            height: 18px;
        }
        .feedback {
            margin-top: 15px;
            padding: 15px;
            background: #f5efe6;
            border-radius: 10px;
            border-left: 5px solid #b7a187;
        }
        .correct-msg { color: #2d6a2d; font-weight: bold; }
        .wrong-msg { color: #b33c3c; font-weight: bold; }
        .partial-msg { color: #b87c2d; font-weight: bold; }
        hr {
            margin: 25px 0;
            border: 1px dashed #e0d2c0;
        }
        footer {
            text-align: center;
            color: #b7a187;
            margin-top: 20px;

// ============ КОД ДЛЯ РОБОТИ ============
let container = document.getElementById('questions');
let scoreSpan = document.getElementById('score');
let statsSpan = document.getElementById('stats');

function renderQuestions() {
    let html = '';
    for (let i = 0; i < questions.length; i++) {
        html += '<div class="question" id="q' + i + '">';
        html += '<div class="qtitle"><span class="qnum">' + (i+1) + '</span> ' + questions[i].q + '</div>';
        html += '<div class="options" id="opts' + i + '">';
        for (let j = 0; j < questions[i].opts.length; j++) {
            html += '<label class="option">';
            html += '<input type="checkbox" id="c' + i + '_' + j + '">';
            html += questions[i].opts[j];
            html += '</label>';
        }
        html += '</div>';
        html += '<div class="feedback" id="fb' + i + '" style="display:none"></div>';
        html += '</div>';
    }
    container.innerHTML = html;
}

function checkAll() {
    let correctCount = 0;
    let partialCount = 0;
    let wrongCount = 0;
    
    for (let i = 0; i < questions.length; i++) {
        let selected = [];
        for (let j = 0; j < questions[i].opts.length; j++) {
            let ch = document.getElementById('c' + i + '_' + j);
            if (ch && ch.checked) {
                selected.push(j);
            }
        }
        
        let correct = questions[i].correct;
        let isCorrect = selected.length === correct.length && selected.every(v => correct.includes(v));
        let isPartial = !isCorrect && selected.some(v => correct.includes(v));
        
        let card = document.getElementById('q' + i);
        let fb = document.getElementById('fb' + i);
        
        if (selected.length === 0) {
            card.className = 'question incorrect';
            fb.innerHTML = '<span class="wrong-msg">❌ Немає відповіді</span><br>' + questions[i].exp;
            fb.style.display = 'block';
            wrongCount++;
        } else if (isCorrect) {
            card.className = 'question correct';
            fb.innerHTML = '<span class="correct-msg">✅ ПРАВИЛЬНО</span><br>' + questions[i].exp;
            fb.style.display = 'block';
            correctCount++;
        } else if (isPartial) {
            card.className = 'question partial';
            fb.innerHTML = '<span class="partial-msg">⚠️ ЧАСТКОВО ПРАВИЛЬНО</span><br>' + questions[i].exp;
            fb.style.display = 'block';
            partialCount++;
        } else {
            card.className = 'question incorrect';
            fb.innerHTML = '<span class="wrong-msg">❌ НЕПРАВИЛЬНО</span><br>' + questions[i].exp;
            fb.style.display = 'block';
            wrongCount++;
        }
    }
    
    scoreSpan.innerHTML = correctCount + '/' + questions.length;
    statsSpan.innerHTML = '✅ ' + correctCount + ' | ⚠️ ' + partialCount + ' | ❌ ' + wrongCount;
}

function resetAll() {
    for (let i = 0; i < questions.length; i++) {
        for (let j = 0; j < questions[i].opts.length; j++) {
            let ch = document.getElementById('c' + i + '_' + j);
            if (ch) ch.checked = false;
        }
        let card = document.getElementById('q' + i);
        if (card) card.className = 'question';
        let fb = document.getElementById('fb' + i);
        if (fb) fb.style.display = 'none';
    }
    scoreSpan.innerHTML = '0/' + questions.length;
    statsSpan.innerHTML = '';
}

function showAnswers() {
    for (let i = 0; i < questions.length; i++) {
        let correct = questions[i].correct;
        for (let j = 0; j < questions[i].opts.length; j++) {
            let ch = document.getElementById('c' + i + '_' + j);
            if (ch) {
                if (correct.includes(j)) {
                    ch.checked = true;
                } else {
                    ch.checked = false;
                }
            }
        }
    }
}

// Запуск
renderQuestions();

document.getElementById('checkBtn').addEventListener('click', checkAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('answersBtn').addEventListener('click', showAnswers);
</script>
</body>
</html>
