<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harris KX • повний тест (60 питань)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5efe6;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff9ef;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e8dccc;
        }
        
        h1 {
            color: #5e4b3c;
            font-size: 2.2em;
            margin-bottom: 10px;
            border-bottom: 2px solid #e8dccc;
            padding-bottom: 15px;
        }
        
        .subtitle {
            color: #8b7a6b;
            margin-bottom: 25px;
            font-style: italic;
        }
        
        .panel {
            background: #f5ede1;
            border-radius: 50px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0d2c0;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .score {
            background: #b7a187;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .btn {
            background: white;
            border: 2px solid #b7a187;
            color: #5e4b3c;
            padding: 10px 25px;
            margin: 0 5px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        
        .btn:hover {
            background: #b7a187;
            color: white;
        }
        
        .btn.danger {
            border-color: #d19a9a;
            color: #a15a5a;
        }
        
        .btn.danger:hover {
            background: #d19a9a;
            color: white;
        }
        
        .questions {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .card {
            background: #fffcf5;
            border: 1px solid #e8dccc;
            border-radius: 25px;
            padding: 25px;
            transition: 0.2s;
        }
        
        .card.correct {
            background: #e8f3e8;
            border-left: 8px solid #7a9e7a;
        }
        
        .card.incorrect {
            background: #fceaea;
            border-left: 8px solid #d19a9a;
        }
        
        .card.partial {
            background: #fff3d6;
            border-left: 8px solid #e6b87a;
        }
        
        .qtitle {
            font-weight: 600;
            color: #5e4b3c;
            margin-bottom: 15px;
            font-size: 1.15rem;
            display: flex;
            align-items: flex-start;
        }
        
        .qnum {
            background: #e8dccc;
            padding: 5px 15px;
            border-radius: 30px;
            margin-right: 15px;
            font-size: 0.9rem;
            color: #5e4b3c;
            white-space: nowrap;
        }
        
        .qtext {
            line-height: 1.5;
        }
        
        .opts {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        .opt {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: #f5efe6;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #e0d2c0;
            transition: 0.1s;
        }
        
        .opt:hover {
            background: #e8dccc;
        }
        
        .opt input[type="checkbox"] {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            accent-color: #b7a187;
            cursor: pointer;
        }
        
        .feedback {
            margin-top: 15px;
            padding: 15px 20px;
            background: #f5efe6;
            border-radius: 20px;
            border-left: 5px solid #b7a187;
        }
        
        .correct-msg {
            color: #2d6a2d;
            font-weight: bold;
        }
        
        .wrong-msg {
            color: #b33c3c;
            font-weight: bold;
        }
        
        .partial-msg {
            color: #b87c2d;
            font-weight: bold;
        }
        
        .explain {
            margin-top: 10px;
            color: #6b5a4b;
            line-height: 1.5;
        }
        
        .explain ul {
            margin-left: 25px;
            margin-top: 8px;
        }
        
        hr {
            margin: 30px 0 20px;
            border: none;
            border-top: 2px dashed #e0d2c0;
        }
        
        footer {
            text-align: center;
            color: #b7a187;
            margin-top: 20px;
            font-size: 0.95rem;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 Harris KX • повний тест</h1>
    <div class="subtitle">60 питань з множинним вибором (за конспектом, стор. 8-22)</div>
    
    <div class="panel">
        <span class="score" id="scoreDisplay">0/60</span>
        <div class="stats">
            <span id="correctCount" style="color:#2d6a2d;">✅ 0</span>
            <span id="partialCount" style="color:#b87c2d;">⚠️ 0</span>
            <span id="wrongCount" style="color:#b33c3c;">❌ 0</span>
        </div>
        <div>
            <button class="btn" id="checkBtn">✅ Перевірити всі</button>
            <button class="btn" id="resetBtn">🔄 Скинути</button>
            <button class="btn danger" id="showAnswersBtn">👁️ Показати відповіді</button>
        </div>
    </div>
    
    <div class="questions" id="questionsContainer"></div>
    
    <hr>
    <footer>На основі конспекту • Harris KX • молодшій сестрі для вивчення</footer>
</div>

<script>
(function() {
    const questions = [
        // ============ МОДУЛЯЦІЇ ============
        {
            q: "Які види модуляції підтримує радіостанція Harris RF-7800H-MP?",

            correct: [0, 1, 2, 3, 4],  // Всі підтримуються!
            exp: "RF-7800H-MP підтримує USB, LSB, AME, CW, FM. FM — в УКХ діапазоні."
        },
        {
            q: "Які види модуляції використовуються для роботи в КХ діапазоні?",

            correct: [0, 1, 2, 3],  // FM тільки в УКХ

        {

            correct: [0, 3],  // USB для КХ, FM для УКХ

        },
        {
            q: "Які види модуляції використовуються для роботи з радіостанціями старого парку?",

        },
        {

        {
            q: "Радіостанція MPR-9600-MP підтримує частотну модуляцію (FM)?",

            correct: [2],  // Не підтримує
            exp: "MPR-9600-MP не має FM (згідно конспекту: «радіостанції MPR-9600-MP не має»)."
        },
        
        // ============ РЕЖИМИ РОБОТИ ============
        {
            q: "Які режими роботи підтримує радіостанція Harris RF-7800H-MP?",

        },
        {
            q: "Які режими роботи підтримує радіостанція MPR-9600-MP?",

            q: "Скільки каналів можна запрограмувати в різних режимах?",

            correct: [0, 1, 2],  // Тільки правильні
            exp: "FIX: до 200 каналів (0-199). 3G: до 63 каналів (100-162). HOP: до 19 хопсетів."
        },
        {
            q: "Для чого призначений режим ALE?",
            opts: ["Фіксована робоча частота", "Адаптивний вибір каналу з автоматичним встановленням зв'язку", "Захист від перешкод", "Передача даних з високою швидкістю"],
            correct: [1],  // Тільки адаптивний вибір
            exp: "ALE (Automatic Link Establishment) — автоматичне встановлення зв'язку з адаптивним вибором каналу."

        {
            q: "Для чого призначений режим HOP?",

            correct: [2],  // ППРЧ
            exp: "HOP — Frequency Hopping, стрибкоподібна зміна частоти для завадозахищеності."
        },
        {
            q: "Які переваги має режим 3G перед звичайним ALE?",

        },
        {
            q: "Які режими потребують синхронізації часу?",
            opts: ["FIX", "ALE", "3G", "HOP"],
            correct: [2, 3],  // 3G і HOP
            exp: "3G потребує синхронізації до 7 хвилин, HOP — до 90 секунд. FIX і ALE не потребують синхронізації."
        },
        {
            q: "Яка допустима похибка часу для різних режимів?",

            correct: [0, 1],  // Правильні значення
            exp: "3G: синхронізація до 7 хвилин. HOP: до 90 секунд (±1,5 хв)."
        },
        {
            q: "Що таке 3G+?",
            opts: ["Покращений HOP", "Режим, що контролює одночасно ALE та 3G мережі", "Тільки передача даних", "Режим для УКХ"],
            correct: [1],  // Контроль обох мереж
            exp: "3G+ дозволяє одночасно контролювати мережі ALE та 3G."
        },
        
        // ============ МОДЕМИ ============
        {
            q: "Які модеми підтримує радіостанція RF-7800H-MP?",
            opts: ["MIL-110B", "SERIAL", "ARQ", "WBHF", "XDL", "WBFSK"],
            correct: [0, 1, 2, 3, 4, 5],  // Всі
            exp: "RF-7800H-MP підтримує всі типи модемів: MIL-110B, SERIAL, ARQ, WBHF, XDL, WBFSK."
        },
        {
            q: "Які модеми НЕ підтримує радіостанція MPR-9600-MP?",
            opts: ["MIL-110B", "SERIAL", "ARQ", "WBHF", "XDL", "WBFSK"],
            correct: [3, 4, 5],  // WBHF, XDL, WBFSK
            exp: "MPR-9600-MP не підтримує WBHF, XDL, WBFSK (позначені червоним у конспекті)."
        },
        {
            q: "Для яких режимів призначений модем MIL-110B?",
            opts: ["FIX", "ALE", "3G", "HOP"],
            correct: [0, 1],  // FIX та ALE
            exp: "MIL-110B використовується в режимах FIX та ALE."
        },
        {
            q: "Для яких режимів призначені модеми SERIAL та ARQ?",
            opts: ["FIX", "ALE", "HOP", "3G"],
            correct: [0, 1, 2],  // FIX, ALE, HOP
            exp: "SERIAL та ARQ працюють в режимах FIX, ALE, HOP зі швидкістю 2400 біт/с."
        },
        {
            q: "Які модеми працюють тільки в режимі 3G?",
            opts: ["MIL-110B", "SERIAL", "WBHF", "XDL"],

            exp: "WBHF (120 кбіт/с) та XDL (75-9600 біт/с) працюють тільки в режимі 3G."
        },
        {
            q: "Які швидкості передачі даних забезпечують різні модеми?",

        },
        {
            q: "Для якого діапазону призначений модем WBFSK?",
            opts: ["КХ діапазон", "УКХ діапазон", "Обидва", "Тільки для супутникового зв'язку"],
            correct: [1],  // УКХ
            exp: "WBFSK — широкосмуговий режим для роботи тільки в УКХ діапазоні."
        },
        
        // ============ ВОКОДЕРИ ============

            q: "Які типи вокодерів підтримує радіостанція Harris?",

        },
        
        // ============ ПРАКТИЧНІ АСПЕКТИ ============
